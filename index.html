<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CLIQQ</title>

<style>

body{
    background:#4b4b5e;
    font-family:sans-serif;
    margin:0;
}

/* container dos cards */
.container{
    display:flex;
    gap:60px;
    padding:40px;
    justify-content:flex-start;
    align-items:flex-start;
}

/* card */
.card{
    width:360px;
    background:#e9e9e9;
    padding:20px;
    border-radius:6px;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-top:0;
    font-size:28px;
    font-weight:bold;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #bbb;
    border-radius:4px;
}

img{
    width:100%;
    border-radius:6px;
    margin-bottom:20px;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

.historico{
    margin-top:20px;
}

.historico span{
    display:inline-block;
    background:#ddd;
    padding:6px 10px;
    margin:4px;
    border-radius:4px;
    cursor:pointer;
    font-size:13px;
}

.historico span:hover{
    background:#cfcfcf;
}

</style>
</head>

<body>

<div class="container">

<!-- CARD PRINCIPAL -->
<div class="card">

<h2>CLIQQ</h2>

<label>Digite a filial:</label>
<input type="number" id="numLoja" placeholder="Ex: 297">

<img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2Y4MWh3MHVodGM1NGVzMnYybjZlMWgyNjR5OTRqbWFjeGg0bHBkayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/NFYmKdjylUTaE/giphy.gif">

<button onclick="irParaLoja()">Ir</button>

<div class="historico">
<b>Últimas lojas:</b>
<div id="listaHistorico"></div>
</div>

</div>

<!-- CARD LIMPAR CACHE -->
<div class="card">

<h2>Limpar Cache</h2>

<label>Digite a filial:</label>
<input type="number" id="lojaCache" placeholder="Ex: 297">

<img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExZDZkZjdtd3M1dWF1emVjbzU4MzUzb2VleDFzZ2JmbjhiNmsxYndrdCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/OU6tgBi0YJ4HK/giphy.gif" alt="gif">
<button onclick="limparCache()">Limpar</button>

</div>

</div>

<script>

const input = document.getElementById("numLoja");
const lista = document.getElementById("listaHistorico");
const inputCache = document.getElementById("lojaCache");

input.focus();

/* ENTER para abrir loja */
input.addEventListener("keypress", function(e){
if(e.key === "Enter"){
irParaLoja();
}
});

/* ENTER para limpar cache */
inputCache.addEventListener("keypress", function(e){
if(e.key === "Enter"){
limparCache();
}
});

function irParaLoja(){

const loja = input.value;

if(!loja){
alert("Digite a filial");
return;
}

const url = `http://qql${loja}00.qq:9000/#!/cliqq/home`;

salvarHistorico(loja);

window.open(url,"_blank");

}

function limparCache(){

const loja = inputCache.value;

if(!loja){
alert("Digite a filial");
return;
}

const url = `http://qql${loja}00.qq:9000/cliqq/api/cache/clearAll`;

fetch(url)
.then(()=>alert("Cache limpo com sucesso"))
.catch(()=>alert("Erro ao limpar cache"));

}

function salvarHistorico(loja){

let historico = JSON.parse(localStorage.getItem("lojas")) || [];

if(!historico.includes(loja)){
historico.unshift(loja);
}

historico = historico.slice(0,5);

localStorage.setItem("lojas",JSON.stringify(historico));

mostrarHistorico();

}

function mostrarHistorico(){

lista.innerHTML="";

let historico = JSON.parse(localStorage.getItem("lojas")) || [];

historico.forEach(loja=>{

const item = document.createElement("span");

item.textContent = loja;

item.onclick = ()=>{
input.value = loja;
irParaLoja();
}

lista.appendChild(item);

});

}

mostrarHistorico();





</script>

</body>
</html>
